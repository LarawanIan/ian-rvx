name: Keystore Format Recovery Tool

on:
  workflow_dispatch:

jobs:
  extract-signature:
    name: Extract and Rebuild Valid Keystore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Extract X.509 from PKCS7
        run: |
          if [ ! -f "cert-recovery/MORPHE.RSA" ]; then
            echo "❌ Error: cert-recovery/MORPHE.RSA not found in your repository!"
            exit 1
          fi
          
          echo "🌐 Decoding cryptographic block layer..."
          openssl pkcs7 -inform DER -in cert-recovery/MORPHE.RSA -print_certs -out /tmp/clean.crt
          
          echo "🔑 Packaging signature into clean production PKCS12 container..."
          keytool -importcert -file /tmp/clean.crt -keystore /tmp/recovered.keystore -alias "morphe-key" -storepass "s3cur3p@ssw0rd" -noprompt
          
          echo ""
          echo "==================== START RECOVERY PAYLOAD ===================="
          base64 -w 0 /tmp/recovered.keystore
          echo ""
          echo "===================== END RECOVERY PAYLOAD ====================="
          echo ""
          
          rm -f /tmp/clean.crt /tmp/recovered.keystore